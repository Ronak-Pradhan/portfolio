- question: Who is Ronak Pradhan?
  answer: >
    Ronak Pradhan is an Applied Scientist working on large language models, fine-tuning,
    and applied ML in production. He is a Data Scientist Intern at Optum (Jan 2024&ndash;present)
    and was previously an Applied Scientist Intern at Amazon (Feb&ndash;Jul 2023). He holds a
    B.Tech in Electronics &amp; Communication Engineering from Manipal Institute of Technology.

- question: What does Ronak work on?
  answer: >
    LLM fine-tuning and PEFT (HuggingFace transformers, peft, BioClinical BERT),
    recommender / retrieval systems (GANs, retrieval models on terabyte-scale data),
    evaluation design, and production deployment via AWS SageMaker, Docker, and Flask.

- question: What measurable impact has Ronak shipped?
  answer: >
    At Amazon, his work on the Amazon.in product retrieval model drove a +0.4% increase in
    Precision @ 1% Recall, +0.2% ROC AUC, and +0.4% Cold-Start ROC AUC over a 100M+ row,
    terabyte-scale training set. At Optum, he significantly improved precision on a healthcare
    textual-entailment task and shipped a production async endpoint on AWS SageMaker.

- question: Is Ronak available for hire?
  answer: >
    Yes. He is open to full-time Applied Scientist / ML Engineer roles and selected
    consulting engagements (typically 4&ndash;12 weeks) where production-quality ML matters.
    The fastest way to start a conversation is via the contact form or a 20-minute Calendly intro call.

